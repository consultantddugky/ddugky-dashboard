<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sanction Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body { background-color: #f4f6f9; }
    .card { border-radius: 12px; }
</style>


</head>
<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Sanction Order Details</h2>

{% if success %} <div class="alert alert-success text-center">{{ success }}</div>
{% endif %}

{% if error %} <div class="alert alert-danger text-center">{{ error }}</div>
{% endif %}

<div class="card shadow p-4">
<form method="POST">


<!-- PIA -->
        <div class="mb-3">
            <label class="form-label">Select PIA</label>
            <select name="pia_prn" class="form-control" required>
                <option value="">-- Select PIA --</option>
                {% for pia in pias %}
                    <option value="{{ pia[0] }}">{{ pia[1] }}</option>
                {% endfor %}
            </select>
        </div>


<div class="mb-3">
    <label>Sanction Order No.</label>
    <input type="text" name="sanction_order_no" class="form-control" required>
</div>

<!-- Job Role -->
<div class="mb-3">
    <label>Job Role</label>
    <input type="text" name="job_role" class="form-control" required>
</div>

<!-- Job Role -->
<div class="mb-3">
    <label>Sector</label>
    <input type="text" name="sector" class="form-control" required>
</div>

<div class="mb-3">
    <label>Total Duration</label>
    <input type="int" name="total_duration" class="form-control" required>
</div>

<div class="mb-3">
    <label>OJT Duration</label>
    <input type="int" name="ojt_duration" class="form-control" required>
</div>


<!-- Total Target -->
<div class="mb-3">
    <label>Total Target</label>
    <input type="number" name="total_target" class="form-control" required>
</div>

<!-- Category Targets -->
<h5 class="mt-4">Category Targets</h5>

<div class="row">
    <div class="col-md-3">
        <label>SC</label>
        <input type="number" name="sc_target" class="form-control">
    </div>
    <div class="col-md-3">
        <label>ST</label>
        <input type="number" name="st_target" class="form-control">
    </div>
    <div class="col-md-3">
        <label>Others</label>
        <input type="number" name="others_target" class="form-control">
    </div>
</div>

<!-- Special Targets -->
<div class="row mt-3">
    <div class="col-md-6">
        <label>Women Target</label>
        <input type="number" name="women_target" class="form-control">
    </div>
    <div class="col-md-6">
        <label>PwD Target</label>
        <input type="number" name="pwd_target" class="form-control">
    </div>
</div>

<!-- Training Type -->
        
<div class="mb-3">
    <label>Nature of Training</label>
        <select name="r_nr" class="form-control" required>
            <option value="">-- Select Type --</option>
            <option value="Residential">Residential</option>
            <option value="Non-Residential">Non-Residential</option>
        </select>
</div>

<!-- Buttons -->
<div class="d-flex justify-content-between mt-4">
    <a href="/dashboard" class="btn btn-secondary">Back</a>
    <button type="submit" class="btn btn-success">Save</button>
</div>


</form>
</div>

</div>

</body>
</html>
