<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Village Summary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<style>
body { background:#f5f7fb; }
.card { border-radius:12px; }
</style>

</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>📍 {{ taluka }} - Village Panchayat Summary</h4>

        <a href="/dashboard?pia_prn={{ selected_pia }}" 
           class="btn btn-secondary">⬅ Back</a>
    </div>

    <!-- KPI -->
    <div class="row mb-3">
        <div class="col-md-3">
            <div class="card p-3 text-center">
                <h6>Total Village Panchayats</h6>
                <h3>{{ data|length }}</h3>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card p-3">
        <div class="table-responsive">
            <table id="villageTable" class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>Village Panchayat</th>
                        <th>No. of Candidates</th>
                    </tr>
                </thead>

                <tbody>
                    {% for row in data %}
                    <tr>
                        <td>{{ row[0] }}</td>
                        <td>{{ row[1] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>
    </div>

</div>

<script>
$(document).ready(function () {
    $('#villageTable').DataTable({
        pageLength: 10
    });
});
</script>

</body>
</html>
