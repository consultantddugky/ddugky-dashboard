<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add PIA</title>


<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
    }
    .card {
        border-radius: 12px;
    }
</style>


</head>
<body>

<div class="container mt-5">

```
<!-- Title -->
<div class="text-center mb-4">
    <h2>Add PIA Details</h2>
    <p class="text-muted">Enter PIA information</p>
</div>

<!-- Success Message -->
{% if success %}
    <div class="alert alert-success text-center">
        {{ success }}
    </div>
{% endif %}

<!-- Error Message -->
{% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
{% endif %}

<!-- Form Card -->
<div class="card shadow p-4">
    <form method="POST">

        <!-- PRN -->
        <div class="mb-3">
            <label class="form-label">PRN</label>
            <input type="text" name="prn" class="form-control" placeholder="Enter PRN" required>
        </div>

        <!-- PIA Name -->
        <div class="mb-3">
            <label class="form-label">PIA Name</label>
            <input type="text" name="pia_name" class="form-control" placeholder="Enter PIA Name" required>
        </div>

        <!-- State -->
        <div class="mb-3">
            <label class="form-label">State</label>
            <input type="text" name="state" class="form-control" placeholder="Enter State" required>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between">
            <a href="/dashboard" class="btn btn-secondary">Back</a>
            <button type="submit" class="btn btn-primary">Save PIA</button>
        </div>

    </form>
</div>


</div>

</body>
</html>
