<!DOCTYPE html>
<html>
<head>
    <title>Edit Candidate</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2c80b4;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            background: #7f8c8d;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #636e72;
        }

    </style>
</head>

<body>

<div class="container">

    <a href="javascript:history.back()" class="back-btn">⬅ Back</a>

    <div class="box">
        <h2>Edit Candidate</h2>

        <form method="POST" action="/update-candidate">

            <!-- Hidden ID -->
            <input type="hidden" name="id" value="{{ c.id }}">

            <label>Name</label>
            <input type="text" name="name" value="{{ c.name }}" required>

            <label>Gender</label>
            <select name="gender" required>
                <option value="">Select</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="Others">Others</option>
            </select>

            <label>Category</label>
            <select name="category">
                <option value="SC">SC</option>
                <option value="ST">ST</option>
                <option value="General">General</option>
                <option value="Others">Others</option>
            </select>

            <label>District</label>
            <input type="text" name="district" value="{{ c.district }}">

            <label>Present Address</label>
            <input type="text" name="present_address" value="{{ c.present_address }}">

            <label>Permanent Address</label>
            <input type="text" name="permanent_address" value="{{ c.permanent_address }}">

            <label>Contact</label>
            <input type="text" name="contact" value="{{ c.contact_details }}">

            <label>Alternate Contact</label>
            <input type="text" name="alternate_contact" value="{{ c.alternate_contact }}">

            <label>Date of Birth</label>
            <input type="date" name="dob" value="{{ c.dob }}">

            <label>PWD</label>
            <select name="pwd_status">
                <option value="N">No</option>
                <option value="Y">Yes</option>
            </select>

            <button type="submit" class="btn">Update Candidate</button>

        </form>
    </div>

</div>

</body>
</html>
