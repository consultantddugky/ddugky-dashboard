<div class="container mt-5">

```
<h2 class="text-center mb-4">Project Timeline Details</h2>

<!-- Success Message -->
{% if success %}
    <div class="alert alert-success text-center">
        {{ success }}
    </div>
{% endif %}

<!-- Error Message -->
{% if error %}
    <div class="alert alert-danger text-center">
        {{ error }}
    </div>
{% endif %}

<div class="card shadow p-4">
    <form method="POST">

        <!-- PIA Dropdown -->
        <div class="mb-3">
            <label class="form-label">Select PIA</label>
            <select name="pia_prn" class="form-control" required>
                <option value="">-- Select PIA --</option>
                {% for pia in pias %}
                    <option value="{{ pia[0] }}">{{ pia[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- MOU Signing Date -->
        <div class="mb-3">
            <label class="form-label">MOU Signing Date</label>
            <input type="date" name="mou_signing_date" class="form-control" required>
        </div>

        <!-- PCO Date -->
        <div class="mb-3">
            <label class="form-label">PCO Date</label>
            <input type="date" name="pco_date" class="form-control" required>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between">
            <a href="/dashboard" class="btn btn-secondary">Back</a>
            <button type="submit" class="btn btn-primary">Save Timeline</button>
        </div>

    </form>
</div>
```

</div>

</body>
</html>
