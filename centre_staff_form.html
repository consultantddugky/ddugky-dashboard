```
<h2 class="text-center mb-4">Centre Staff</h2>

<!-- Messages -->
{% if success %}
    <div class="alert alert-success text-center">{{ success }}</div>
{% endif %}

{% if error %}
    <div class="alert alert-danger text-center">{{ error }}</div>
{% endif %}

<div class="card shadow p-4">
    <form method="POST">

        <!-- Centre Dropdown -->
        <div class="mb-3">
            <label class="form-label">Select Training Centre</label>
            <select name="centre_id" class="form-control" required>
                <option value="">-- Select Centre --</option>
                {% for centre in centres %}
                    <option value="{{ centre[0] }}">{{ centre[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Role Dropdown -->
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-control" required>
                <option value="">-- Select Role --</option>
                <option value="Centre Head">Centre Head</option>
                <option value="Mobilisation Head">Mobilisation Head</option>
                <option value="MIS Head">MIS Head</option>
                <option value="Trainer-1">Trainer-1</option>
                <option value="Trainer-2">Trainer-2</option>
                <option value="Trainer-3">Trainer-3</option>
                <option value="Trainer-4">Trainer-4</option>
                <option value="IT Trainer"> IT Trainer</option>
                <option value="English/Soft Skill Trainer">English/Soft Skill Trainer</option>
                <option value="Placement Head">Placement Head</option>
            </select>
        </div>

        <!-- Name -->
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter staff name" required>
        </div>

        <!-- Contact -->
        <div class="mb-3">
            <label class="form-label">Contact</label>
            <input type="text" name="contact" class="form-control" placeholder="Enter contact number" required>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between">
            <a href="/dashboard" class="btn btn-secondary">Back</a>
            <button type="submit" class="btn btn-primary">Save Staff</button>
        </div>

    </form>
</div>
```
