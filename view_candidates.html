<!DOCTYPE html>
<html>
<head>
    <title>View Candidates</title>
</head>
<body>

<h2>Candidate List</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Gender</th>
        <th>PwD</th>
    </tr>

    {% for c in candidates %}
    <tr>
        <td>{{ c[0] }}</td>
        <td>{{ c[1] }}</td>
        <td>{{ c[2] }}</td>
        <td>{{ c[3] }}</td>
        <td>{{ c[4] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
