<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Training Centre</title>

<!-- Bootstrap -->

<body>

<div class="container mt-5">

```
<h2 class="text-center mb-4">Training Centre Details</h2>

<!-- Success Message -->
{% if success %}
    <div class="alert alert-success text-center">{{ success }}</div>
{% endif %}

<!-- Error Message -->
{% if error %}
    <div class="alert alert-danger text-center">{{ error }}</div>
{% endif %}

<div class="card shadow p-4">
    <form method="POST">

        <!-- PIA -->
        <div class="mb-3">
            <label class="form-label">Select PIA</label>
            <select name="pia_prn" class="form-control" required>
                <option value="">-- Select PIA --</option>
                {% for pia in pias %}
                    <option value="{{ pia[0] }}">{{ pia[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Centre Name -->
        <div class="mb-3">
            <label>Centre Name</label>
            <input type="text" name="centre_name" class="form-control" required>
        </div>

        <!-- District & State -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>District</label>
                <input type="text" name="district" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label>State</label>
                <input type="text" name="state" class="form-control" required>
            </div>
        </div>

        <!-- Capacity -->
        <h5 class="mt-3">Capacity Details</h5>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Male Capacity</label>
                <input type="number" name="male_capacity" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
                <label>Female Capacity</label>
                <input type="number" name="female_capacity" class="form-control">
            </div>
            <div class="col-md-4 mb-3">
                <label>Total Capacity</label>
                <input type="number" name="total_capacity" class="form-control">
            </div>
        </div>

        <!-- Residential Type -->
        <div class="mb-3">
            <label>Nature of Training</label>
            <select name="r_nr" class="form-control" required>
                <option value="">-- Select Type --</option>
                <option value="Residential">Residential</option>
                <option value="Non-Residential">Non-Residential</option>
            </select>
        </div>

        <!-- Training Centre Capacity -->
        <div class="mb-3">
            <label>Training Centre Capacity</label>
            <input type="number" name="training_centre_capacity" class="form-control">
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between">
            <a href="/dashboard" class="btn btn-secondary">Back</a>
            <button type="submit" class="btn btn-primary">Save Centre</button>
        </div>

    </form>
</div>
```

</div>

</body>
</html>
