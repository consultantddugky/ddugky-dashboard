<!DOCTYPE html>
<html>
<head>
    <title>All Candidates</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f7fb;
        }

        h2 {
            margin-bottom: 10px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .download-btn {
            background: #22c55e;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #0c0b1e;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        .badge-active {
            background: #22c55e;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .badge-freezed {
            background: #ef4444;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="top-bar">
    <h2>👥 All Candidates</h2>
    <a href="/download-candidates" class="download-btn">⬇ Download CSV</a>
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Gender</th>
        <th>Category</th>
        <th>District</th>
        <th>Contact</th>
        <th>Enrollment Date</th>
        <th>Status</th>
    </tr>

    {% for c in candidates %}
    <tr>
        <td>{{ c[0] }}</td>
        <td>{{ c[1] }}</td>
        <td>{{ c[2] }}</td>
        <td>{{ c[3] }}</td>
        <td>{{ c[4] }}</td>
        <td>{{ c[5] }}</td>
        <td>{{ c[6] }}</td>

        <td>
            {% if c[7] >= 10 %}
                <span class="badge-freezed">Freezed</span>
            {% else %}
                <span class="badge-active">Active</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
