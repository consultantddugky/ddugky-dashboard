<!-- ✅ JavaScript -->

<script>
function showUploadField() {
    let value = document.getElementById("eligibility").value;
    let section = document.getElementById("upload-section");
    let fields = document.getElementsByClassName("upload-field");

    // Hide all fields first
    for (let i = 0; i < fields.length; i++) {
        fields[i].style.display = "none";
    }

    // If nothing selected
    if (value === "") {
        section.style.display = "none";
        return;
    }

    // Show section
    section.style.display = "block";

    // Show selected field
    let selectedField = document.getElementById(value);
    if (selectedField) {
        selectedField.style.display = "block";
    }
}
</script>


<!-- Job Role -->
<div class="mb-3">
    <label>Job Role</label>
    <input type="text" name="job_role" class="form-control">
</div>

<button type="submit" class="btn btn-primary">Save Candidate</button>
```

</form>
</div>
</div>

<!-- ✅ JS -->

<script>
function loadBatches() {
    let piaId = document.getElementById("pia").value;
    let batchDropdown = document.getElementById("batch");

    if (!piaId) {
        batchDropdown.innerHTML = '<option value="">Select Batch</option>';
        return;
    }

    batchDropdown.innerHTML = '<option>Loading...</option>';

    fetch('/get_batches/' + piaId)
        .then(response => response.json())
        .then(data => {
            console.log("Batches:", data); // DEBUG

            batchDropdown.innerHTML = '<option value="">Select Batch</option>';

            data.forEach(batch => {
                let option = document.createElement("option");
                option.value = batch;
                option.text = batch;
                batchDropdown.appendChild(option);
            });
        })
        .catch(error => {
            console.error("Error:", error);
            batchDropdown.innerHTML = '<option>Error loading batches</option>';
        });
}
</script>
