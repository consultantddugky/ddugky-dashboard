```
<h2 class="text-center mb-4">PIA Staff Details</h2>

<!-- Messages -->
{% if success %}
    <div class="alert alert-success text-center">{{ success }}</div>
{% endif %}

{% if error %}
    <div class="alert alert-danger text-center">{{ error }}</div>
{% endif %}

<div class="card shadow p-4">
    <form method="POST">

        <!-- PIA Dropdown -->
        <div class="mb-3">
            <label class="form-label">Select PIA</label>
            <select name="pia_prn" class="form-control" required>
                <option value="">-- Select PIA --</option>
                {% for pia in pias %}
                    <option value="{{ pia[0] }}">{{ pia[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Role -->
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-control" required>
                <option value="">-- Select Role --</option>
                <option value="PIA Director">PIA Director</option>
                <option value="Finance Head">Finance Head</option>
                <option value="National Head">National Head</option>
                <option value="State Head">State Head</option>
                <option value="MIS Head">MIS Head</option>
                <option value="Q-Team Head">Q-Team Head</option>
                <option value="Centre Head">Centre Head</option>
            </select>
        </div>
 
        <!-- Name -->
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter staff name" required>
        </div>

        <!-- Contact -->
        <div class="mb-3">
            <label class="form-label">Contact</label>
            <input type="text" name="contact" class="form-control" placeholder="Enter contact number" required>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between">
            <a href="/dashboard" class="btn btn-secondary">Back</a>
            <button type="submit" class="btn btn-primary">Save Staff</button>
        </div>

    </form>
</div>
```

</div>

</body>
</html>
